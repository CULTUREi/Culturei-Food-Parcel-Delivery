<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Culturei – Menu</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🍜 Culturei</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Menu</a></li>
                <li><a href="text.html">About</a></li>
                <li>
                    <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode">
                        🌙
                    </button>
                </li>
                <li>
                    <a href="#" class="cart-icon" id="cartToggle">
                        🛒 <span class="cart-count" id="cartCount">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Menu Section with Search -->
    <section class="menu-section">
        <h2>Our Cultural Menu</h2>
        <p class="menu-subtitle">Each dish comes with a story from its homeland.</p>
        
        <!-- Search & Filter Bar -->
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by dish, origin, or cuisine..." />
                <button id="clearSearch" class="clear-search">✕</button>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="favorites">⭐ Favorites</button>
            </div>
        </div>

        <div class="menu-grid" id="menuGrid">
            <!-- Items will be injected by JavaScript -->
        </div>
    </section>

    <!-- Order History Section -->
    <section class="order-history-section" id="orderHistorySection">
        <h2>📜 Your Order History</h2>
        <div id="orderHistoryList">
            <p class="empty-orders">No orders yet. Start exploring!</p>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>🛒 Your Cart</h2>
            <button class="cart-close" id="cartClose">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <p class="empty-cart">Your cart is empty. Start exploring!</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-checkout" id="checkoutBtn">Checkout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
