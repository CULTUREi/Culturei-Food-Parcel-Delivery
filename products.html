<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurants · Culturei</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .products-hero {
            text-align: center;
            padding: 3rem 5% 1rem;
        }
        .products-hero h1 { font-size: 3rem; font-weight: 800; }
        .products-hero h1 span { color: var(--accent-orange); }
        .products-hero p { color: var(--text-muted); max-width: 500px; margin: 0.5rem auto 0; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            padding: 2rem 5% 4rem;
        }
        .product-item {
            background: var(--secondary-black);
            border-radius: 1.5rem;
            padding: 2rem 1.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: var(--transition);
            cursor: pointer;
        }
        .product-item:hover {
            transform: translateY(-6px);
            border-color: var(--accent-orange);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .product-item .icon { font-size: 3rem; color: var(--accent-orange); margin-bottom: 0.5rem; }
        .product-item h3 { font-size: 1.2rem; font-weight: 600; }
        .product-item .price { color: var(--accent-orange); font-weight: 700; font-size: 1.1rem; margin-top: 0.3rem; }
        .product-item .btn-small { margin-top: 0.8rem; }
    </style>
</head>

    <header>
        <div class="logo">Culture<span>i</span><span class="tagline">Delivery · Across Mzansi</span></div>
        <nav>

                <li><a href="driver.html">Drivers</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

            <button class="btn-outline-light" onclick="openLogin()">Sign In</button>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <section class="products-hero">
        <h1>Our <span>Restaurants</span></h1>
        <p>Order from 12,000+ restaurants across South Africa</p>
    </section>
