<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Delivery App</title>
</head>
<body>

    <!-- ============================================ -->
    <!-- FIREBASE LIBRARIES (ALL 3 of them!) -->
    <!-- ============================================ -->
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
    
    <!-- 🔥 THIS IS THE NEW ONE I ADDED (NO STYLES CHANGED!) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- 🔥 ADDED FOR GOOGLE SIGN-IN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- ============================================ -->
    <!-- YOUR ORIGINAL HTML - EXACTLY AS YOU HAD IT! -->
    <!-- ============================================ -->
    
    <!-- I ONLY added this h1 so you can see something. DELETE IT if you want! -->
    <h1>Welcome to my Delivery Store! 🚚</h1>
    
    <!-- THIS IS YOUR EXACT FORM FROM THE SCREENSHOT - NOTHING CHANGED! -->
    <form id="paymentForm">
        <div class="form-row">
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" placeholder="e.g. Cape Town" required />
            </div>
            <div class="form-group">
                <label>Postal Code</label>
                <input type="text" id="postalCode" placeholder="e.g. 8001" />
            </div>
        </div>
        <button type="submit" class="btn-pay">
            <span id="payText">Pay Now</span>
            <span class="spinner" id="spinner"></span>
        </button>
    </form>

    <!-- 🔥 ADDED GOOGLE SIGN-IN BUTTON (NO STYLES CHANGED) -->
    <div style="margin-top: 1rem;">
        <button id="googleSignInBtn" style="padding: 0.7rem 1.5rem; border-radius: 60px; border: 1.5px solid #ddd; background: #fff; color: #757575; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
            🔵 Sign in with Google
        </button>
    </div>

    <!-- ============================================ -->
    <!-- FIREBASE CONFIG - EXACTLY AS YOU HAD IT! -->
    <!-- ============================================ -->
    <script>
   const firebaseConfig = {
  apiKey: "AIzaSyDQWu0hbTP1NFVMKlZ9GZk9JN19XNvqJ3g",
  authDomain: "culturei-food-parcel-del-6a5cb.firebaseapp.com",
  projectId: "culturei-food-parcel-del-6a5cb",
  storageBucket: "culturei-food-parcel-del-6a5cb.firebasestorage.app",
  messagingSenderId: "1045902648656",
  appId: "1:1045902648656:web:5c582e4e3831b67e2fb855",
  measurementId: "G-91BSVDGQ92"
};

    firebase.initializeApp(firebaseConfig);
    firebase.analytics();

    // ============================================
    // GOOGLE SIGN-IN (ADDED - NO STYLES CHANGED)
    // ============================================
    
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.getElementById('googleSignInBtn').addEventListener('click', function() {
        const btn = this;
        btn.textContent = '⏳ Loading...';
        btn.disabled = true;

        const provider = new firebase.auth.GoogleAuthProvider();
        
        auth.signInWithPopup(provider)
            .then((result) => {
                const user = result.user;
                alert(`✅ Welcome, ${user.displayName || user.email}!`);
                
                // Save to Firestore
                db.collection('users').doc(user.uid).set({
                    email: user.email,
                    name: user.displayName || 'User',
                    photoURL: user.photoURL || '',
                    lastLogin: new Date()
                }, { merge: true });
                
                btn.textContent = '✅ Signed In!';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            })
            .catch((error) => {
                let message = '❌ Error: ' + error.message;
                if (error.code === 'auth/popup-closed-by-user') {
                    message = '❌ Sign-in cancelled. Please try again.';
                }
                alert(message);
                btn.textContent = '🔵 Sign in with Google';
                btn.disabled = false;
            });
    });

    // ============================================
    // YOUR EXISTING PAYMENT FORM CODE (UNCHANGED)
    // ============================================
    
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Payment form submitted!');
        // Your existing payment logic here
    });

    </script>

    <!-- ============================================ -->
    <!-- YOUR SCRIPT.JS - EXACTLY AS YOU HAD IT! -->
    <!-- ============================================ -->
    <script src="script.js"></script>

</body>
</html>
